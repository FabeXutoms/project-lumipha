<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="robots" content="noindex, nofollow">
    <link rel="canonical" href="https://www.lumipha.com" />
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumipha - Telefon ile Ulaşın</title>
    <link rel="stylesheet" href="contactcontents.css">
</head>
<body>
    <section class="contactContent">
        <div class="contactContentHeader">
            <a href="contact.html"><img src="images/back.svg" alt=""></a>
            <h1 class="contentHeaderTitle">Telefon ile Arayın</h1>
        </div>
    </section>

    <section class="indicatorButtons">
        <div class="indicatorButtonsContainer">
            <div class="copyMessage" id="kopyalandiMesaji">
                <h3 class="copyMessageTitle">Kopyalandı</h3>
            </div>
            <img src="images/IconMailBig.svg" alt="" class="ImgContainer">
            <h2 class="indicatorButtonHeaderTitle" id="kopyalanacakMetin">555 555 5555</h2>
            <div class="containerInfoBannerBlack">
                <img src="images/flaslight-white.svg" alt="">
                <h3 class="bannerTitleBlack">24 Saat içinde dönüş</h3>
            </div>
            <div class="alignmentOpenWp">
                <a class="openWp">Birlikte Aç</a>
                <img src="images/upline-arrow.svg" alt="">
            </div>
            <hr class="containerLine">
            <button class="copyButton" id="kopyalaBtn">Kopyala</button>
        </div>
    </section>

    <section class="otherWaysButtons">
        <h1 class="otherWaysButtonsTitle">Diğer Yollar</h1>

        <a class="help-button" href="contactmail.html">
            <h2 class="help-title-second">Mail Yollayın</h2>
            <img src="images/ri_arrow-right-line.svg" alt="">
        </a>
        <a class="help-button help-button-alignment" href="contactwp.html">
            <h2 class="help-title-second">WhatsApp ile Ulaşın</h2>
            <img src="images/ri_arrow-right-line.svg" alt="">
        </a>
    </section>
    
    <script src="contactcontents.js"></script>
</body>
</html>
